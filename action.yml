name: 'Markmap-Actions'
description: 'Convert Markdown files to interactive mindmap HTML and deploy to GitHub Pages'
author: 'markmap-action'

inputs:
  files:
    description: |
      Glob patterns for Markdown files to convert (space or newline separated).
      Use * to target all .md files in the repository.
    required: false
    default: '**/*.md'
  output-dir:
    description: 'Directory for generated HTML files'
    required: false
    default: '.markmap'
  offline:
    description: 'Inline all assets into the HTML so it works without internet access'
    required: false
    default: 'false'
  toolbar:
    description: 'Include an interactive toolbar in the generated HTML'
    required: false
    default: 'true'
  format:
    description: 'Output format: html | svg | both'
    required: false
    default: 'html'
  commit:
    description: 'Commit generated files back to the repository'
    required: false
    default: 'false'
  commit-message:
    description: 'Commit message used when pushing the generated files'
    required: false
    default: 'chore: update markmap visualizations'
  deploy-pages:
    description: |
      Deploy generated HTML to GitHub Pages automatically.
      Requires the following job-level permissions:
        pages: write
        id-token: write
    required: false
    default: 'true'
  deploy-target:
    description: |
      Deployment target: github-pages | cloudflare
      Overrides deploy-pages when set to cloudflare.
      Leave empty to use deploy-pages behavior (default).
    required: false
    default: ''
  cloudflare-account-id:
    description: 'Cloudflare account ID (required when deploy-target is cloudflare)'
    required: false
    default: ''
  cloudflare-api-token:
    description: 'Cloudflare API token with Pages:Edit permission (required when deploy-target is cloudflare)'
    required: false
    default: ''
  cloudflare-project-name:
    description: 'Cloudflare Pages project name (defaults to repository name)'
    required: false
    default: ''
  cloudflare-access-policy:
    description: |
      Cloudflare Access policy (YAML list). Restricts who can view the deployed site.
      Supported rule types:
        - github-org: <org>           Members of a GitHub organization
        - github-team: <org>/<team>   Members of a specific GitHub team
        - email-domain: <domain>      Anyone with an email on this domain
        - email: <address>            A specific email address
      Requires: (1) Zero Trust: Edit permission on the API token
                (2) GitHub identity provider configured in Cloudflare Zero Trust dashboard
    required: false
    default: ''
  lang:
    description: 'Default language for the index page (en or ko)'
    required: false
    default: 'en'

outputs:
  generated-files:
    description: 'Newline-separated list of successfully generated file paths'
    value: ${{ steps.generate.outputs.generated-files }}
  failed-files:
    description: 'Newline-separated list of source files that failed to convert'
    value: ${{ steps.generate.outputs.failed-files }}
  page-url:
    description: 'URL of the deployed site (GitHub Pages or Cloudflare Pages)'
    value: ${{ steps.deploy-github.outputs.page_url || steps.deploy-cf.outputs.cf_url }}

runs:
  using: composite
  steps:
    - id: generate
      name: Generate markmap HTML
      run: node "${{ github.action_path }}/dist/index.js"
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_OUTPUT-DIR: ${{ inputs.output-dir }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_TOOLBAR: ${{ inputs.toolbar }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_COMMIT: ${{ inputs.commit }}
        INPUT_COMMIT-MESSAGE: ${{ inputs.commit-message }}
        INPUT_LANG: ${{ inputs.lang }}

    # ── GitHub Pages ────────────────────────────────────────────────────────

    - id: enable-pages
      name: Enable GitHub Pages if not already active
      if: ${{ inputs.deploy-pages == 'true' && inputs.deploy-target != 'cloudflare' }}
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $GH_TOKEN" \
          "https://api.github.com/repos/$GH_REPO/pages")

        if [ "$HTTP" = "200" ] || [ "$HTTP" = "204" ]; then
          echo "GitHub Pages already configured."
          echo "pages_ready=true" >> $GITHUB_OUTPUT

        elif [ "$HTTP" = "404" ]; then
          BODY=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"build_type":"workflow"}' \
            "https://api.github.com/repos/$GH_REPO/pages")
          CODE=$(echo "$BODY" | tail -1)

          if [ "$CODE" = "201" ]; then
            echo "GitHub Pages enabled."
            echo "pages_ready=true" >> $GITHUB_OUTPUT
          else
            MSG=$(echo "$BODY" | head -1)
            echo "::warning::GitHub Pages could not be enabled (HTTP $CODE)."
            echo "::warning::Private repositories may require a paid GitHub plan."
            echo "::warning::Alternatives: deploy-target: cloudflare  |  commit: true  |  make the repo public"
            echo "::warning::Details: $MSG"
            echo "pages_ready=false" >> $GITHUB_OUTPUT
          fi

        else
          echo "::warning::Unexpected response from Pages API (HTTP $HTTP). Skipping deployment."
          echo "pages_ready=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Upload Pages artifact
      if: ${{ inputs.deploy-pages == 'true' && inputs.deploy-target != 'cloudflare' && steps.enable-pages.outputs.pages_ready == 'true' }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ inputs.output-dir }}

    - id: deploy-github
      name: Deploy to GitHub Pages
      if: ${{ inputs.deploy-pages == 'true' && inputs.deploy-target != 'cloudflare' && steps.enable-pages.outputs.pages_ready == 'true' }}
      uses: actions/deploy-pages@v4

    # ── Cloudflare Pages ────────────────────────────────────────────────────

    - name: Setup Node.js 22 for wrangler
      if: ${{ inputs.deploy-target == 'cloudflare' }}
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - id: deploy-cf
      name: Deploy to Cloudflare Pages
      if: ${{ inputs.deploy-target == 'cloudflare' }}
      shell: bash
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CF_PROJECT: ${{ inputs.cloudflare-project-name }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        PROJECT="${CF_PROJECT:-${GITHUB_REPOSITORY##*/}}"
        echo "Deploying to Cloudflare Pages project: $PROJECT"

        OUTPUT=$(npx wrangler@latest pages deploy "$OUTPUT_DIR" \
          --project-name "$PROJECT" \
          --commit-dirty=true 2>&1)
        echo "$OUTPUT"

        URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.pages\.dev[^ ]*' | tail -1)
        if [ -n "$URL" ]; then
          echo "cf_url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        fi

    - id: setup-cf-access
      name: Configure Cloudflare Access policy
      if: ${{ inputs.deploy-target == 'cloudflare' && inputs.cloudflare-access-policy != '' }}
      shell: bash
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CF_PROJECT: ${{ inputs.cloudflare-project-name }}
        CF_ACCESS_POLICY: ${{ inputs.cloudflare-access-policy }}
      run: |
        node - << 'JSEOF'
        const https = require('https');

        const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
        const apiToken  = process.env.CLOUDFLARE_API_TOKEN;
        const repo      = process.env.GITHUB_REPOSITORY || '';
        const project   = process.env.CF_PROJECT || repo.split('/').pop() || 'markmap';
        const domain    = `${project}.pages.dev`;
        const policyRaw = process.env.CF_ACCESS_POLICY || '';

        function cfApi(method, path, body) {
          return new Promise((resolve, reject) => {
            const data = body ? JSON.stringify(body) : null;
            const req = https.request({
              hostname: 'api.cloudflare.com',
              path: `/client/v4${path}`,
              method,
              headers: {
                'Authorization': `Bearer ${apiToken}`,
                'Content-Type': 'application/json',
                ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {}),
              },
            }, res => {
              let raw = '';
              res.on('data', c => raw += c);
              res.on('end', () => { try { resolve(JSON.parse(raw)); } catch { resolve(raw); } });
            });
            req.on('error', reject);
            if (data) req.write(data);
            req.end();
          });
        }

        function parsePolicy(text) {
          const includes = [];
          for (const line of text.split('\n')) {
            const m = line.trim().match(/^-\s+(\S+):\s+(.+)$/);
            if (!m) continue;
            const [, type, value] = m;
            const v = value.trim();
            if (type === 'github-org') {
              includes.push({ 'github-organization': { name: v } });
            } else if (type === 'github-team') {
              const slash = v.indexOf('/');
              const org  = slash >= 0 ? v.slice(0, slash) : v;
              const team = slash >= 0 ? v.slice(slash + 1) : '';
              includes.push({ 'github-organization': { name: org, ...(team ? { team } : {}) } });
            } else if (type === 'email-domain') {
              includes.push({ email_domain: { domain: v } });
            } else if (type === 'email') {
              includes.push({ email: { email: v } });
            } else {
              console.warn(`Unknown policy rule type: "${type}" — skipping`);
            }
          }
          return includes;
        }

        async function main() {
          const includes = parsePolicy(policyRaw);
          if (includes.length === 0) {
            console.log('No valid access policy rules parsed. Skipping Cloudflare Access setup.');
            return;
          }
          console.log(`Applying Cloudflare Access policy to https://${domain}`);
          console.log('Rules:', JSON.stringify(includes, null, 2));

          // Find or create Access Application
          const appsRes = await cfApi('GET', `/accounts/${accountId}/access/apps`);
          if (!appsRes.success) {
            console.error('Failed to list Access apps:', JSON.stringify(appsRes.errors));
            process.exit(1);
          }
          const existing = (appsRes.result || []).find(a => a.domain === domain);

          let appId;
          if (existing) {
            appId = existing.id || existing.uid;
            console.log(`Found existing Access application (${appId})`);
          } else {
            const createRes = await cfApi('POST', `/accounts/${accountId}/access/apps`, {
              name: `markmap-actions / ${project}`,
              domain,
              type: 'self_hosted',
              session_duration: '24h',
              allowed_idps: [],
              auto_redirect_to_identity: false,
            });
            if (!createRes.success) {
              console.error('Failed to create Access application:', JSON.stringify(createRes.errors));
              process.exit(1);
            }
            appId = createRes.result.id || createRes.result.uid;
            console.log(`Created Access application (${appId}) for ${domain}`);
          }

          // Replace all existing policies with the new one
          const existingPolicies = await cfApi('GET', `/accounts/${accountId}/access/apps/${appId}/policies`);
          for (const p of existingPolicies.result || []) {
            await cfApi('DELETE', `/accounts/${accountId}/access/apps/${appId}/policies/${p.id}`);
          }

          const policyRes = await cfApi('POST', `/accounts/${accountId}/access/apps/${appId}/policies`, {
            name: 'markmap-actions auto policy',
            decision: 'allow',
            include: includes,
            exclude: [],
            require: [],
          });
          if (!policyRes.success) {
            console.error('Failed to create Access policy:', JSON.stringify(policyRes.errors));
            process.exit(1);
          }
          console.log(`Access policy applied. Only authorized users can view https://${domain}`);
        }

        main().catch(e => { console.error(e.message); process.exit(1); });
        JSEOF

branding:
  icon: 'map'
  color: 'blue'
